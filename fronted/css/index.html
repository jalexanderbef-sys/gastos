<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Gastos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tarjeta">
        <h1>Admin Gastos</h1>
        
        <form id="formulario-finanzas">
            <div class="grupo-campo">
                <label for="monto">MONTO</label>
                <input type="number" id="monto" class="entrada-monto" placeholder="100.000" step="0.01">
            </div>

            <div class="grupo-campo">
                <select id="categoria">
                    <option value="" disabled selected>Categorías</option>
                    <option value="vivienda">Vivienda</option>
                    <option value="comida">Comida</option>
                    <option value="transporte">Transporte</option>
                    <option value="salud">Salud</option>
                </select>
            </div>

            <div class="grupo-campo">
                <input type="date" id="fecha" value="2020-03-02">
            </div>

            <div class="acciones">
                <div class="contenedor-boton">
                    <button type="button" class="btn btn-suma" aria-label="Ingreso">+</button>
                    <span>Ingreso</span>
                </div>
                <div class="contenedor-boton">
                    <button type="button" class="btn btn-resta" aria-label="Gasto">−</button>
                    <span>Gasto</span>
                </div>
            </div>
        </form>
    </div>

</body>
</html>
